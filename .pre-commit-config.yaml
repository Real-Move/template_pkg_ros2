repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: mixed-line-ending
    -   id: check-shebang-scripts-are-executable
    -   id: check-executables-have-shebangs

-   repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.1
    hooks:
    -   id: clang-format
        types_or: [c, c++]

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
    -   id: ruff-check
        args: [--fix]
    -   id: ruff-format

-   repo: local
    hooks:
    -   id: check-launch-file-names
        name: check launch file name format
        entry: .pre-commit/check_launch_file_names.py
        language: python
        types: [file]
- repo: local
  hooks:
    - id: check-case-filenames
      name: enforce snake_case filenames
      entry: .pre-commit/check_case_filenames.py
      language: python
      files: \.(cpp|hpp|h|py)$

- repo: https://github.com/Lucas-C/pre-commit-hooks
  rev: v1.1.12
  hooks:
    - id: insert-license
      name: "Insert license header in C++ source files"
      args:
        - --license-filepath=.pre-commit/LICENSE_HEADER.txt
        - --comment-style=/*| *| */
        - --detect-license-in-X-top-lines=20
      types_or: [c, c++, objective-c]

    - id: insert-license
      name: "Insert license header in Python source files"
      args:
        - --license-filepath=.pre-commit/LICENSE_HEADER.txt
        - --comment-style=#
        - --detect-license-in-X-top-lines=20
      types_or: [python]
